<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — ElectroInventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .auth-demo { margin-top:1.5rem; padding:1rem; background:var(--bg); border-radius:10px; border:1px solid var(--border); }
  .auth-demo h5 { font-size:.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:.6rem; }
  .demo-cred { display:flex; justify-content:space-between; font-size:.8rem; padding:.25rem 0; }
  .demo-cred span { color:var(--text-muted); }
  .demo-cred strong { color:var(--text); }
  .divider { text-align:center; color:var(--text-muted); font-size:.8rem; margin:1rem 0; position:relative; }
  .divider::before,.divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
  .divider::before { left:0; } .divider::after { right:0; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <div><h1>ElectroInventory</h1><small>Electrical Appliances Management</small></div>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="l-email" class="form-control" type="email" placeholder="you@example.com" value="admin@inventory.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="l-pass" class="form-control" type="password" placeholder="••••••••" value="admin123"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;" onclick="doLogin()">
        Sign In →
      </button>

      <div class="auth-demo">
        <h5>Demo Credentials</h5>
        <div class="demo-cred"><span>Admin</span><strong>admin@inventory.com / admin123</strong></div>
        <div class="demo-cred"><span>Seller</span><strong>seller@inventory.com / seller123</strong></div>
        <div class="demo-cred"><span>User</span><strong>user@inventory.com / user123</strong></div>
      </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="r-name" class="form-control" type="text" placeholder="John Doe"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="r-email" class="form-control" type="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="r-pass" class="form-control" type="password" placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone (optional)</label>
        <input id="r-phone" class="form-control" type="tel" placeholder="+91 9999999999"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;" onclick="doRegister()">
        Create Account
      </button>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script src="js/api.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!email || !password) return toast('Fill all fields','warning');
  const res = await api.post('/auth/login', { email, password });
  if (!res) return;
  if (!res.token) return toast(res.message || 'Login failed','error');
  localStorage.setItem('token', res.token);
  localStorage.setItem('role', res.role);
  localStorage.setItem('user', JSON.stringify({ id: res.id, name: res.name, email: res.email }));
  toast('Welcome, ' + res.name + '!', 'success');
  setTimeout(() => {
    if (res.role === 'ADMIN')  window.location.href = 'admin/dashboard.html';
    else if (res.role === 'SELLER') window.location.href = 'seller/dashboard.html';
    else window.location.href = 'user/shop.html';
  }, 600);
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  const phone = document.getElementById('r-phone').value.trim();
  if (!name || !email || !password) return toast('Fill required fields','warning');
  const res = await api.post('/auth/register', { name, email, password, phone });
  if (!res) return;
  if (res.success) { toast('Registered! Please sign in.','success'); switchTab('login'); }
  else toast(res.message || 'Registration failed','error');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Redirect if already logged in
if (getToken()) {
  const r = getRole();
  if (r === 'ADMIN') window.location.href = 'admin/dashboard.html';
  else if (r === 'SELLER') window.location.href = 'seller/dashboard.html';
  else window.location.href = 'user/shop.html';
}
</script>
</body>
</html>
